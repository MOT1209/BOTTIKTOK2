<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikBoost Premium - Growth Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --oled-black: #000000;
            --tiktok-dark: #0a0a0a;
            --accent-cyan: #25F4EE;
            --accent-pink: #FE2C55;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--oled-black);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .premium-bg {
            background: radial-gradient(circle at top right, rgba(37, 244, 238, 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(254, 44, 85, 0.05), transparent 40%);
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .neon-glow-cyan { box-shadow: 0 0 15px rgba(37, 244, 238, 0.2); }
        .neon-glow-pink { box-shadow: 0 0 15px rgba(254, 44, 85, 0.2); }

        .nav-active {
            color: white;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex justify-center items-center premium-bg">

    <!-- Mobile Container -->
    <div id="main-container" class="w-full max-w-md h-screen bg-black relative flex flex-col shadow-[0_0_100px_rgba(0,0,0,1)] border-x border-white/5 overflow-hidden">
        
        <!-- Top Status Bar -->
        <div class="px-6 pt-2 pb-1 flex justify-between items-center text-[10px] font-bold text-white/40 z-50">
            <span id="time">12:00</span>
            <div class="flex gap-2">
                <div id="backend-status" class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                    <span>OFFLINE</span>
                </div>
                <i class="fa-solid fa-wifi text-[8px]"></i>
                <i class="fa-solid fa-battery-full text-[8px]"></i>
            </div>
        </div>

        <!-- App Dynamic Content -->
        <main id="view-content" class="flex-1 overflow-hidden relative"></main>

        <!-- Premium Navigation -->
        <nav class="h-20 glass border-t border-white/5 flex justify-around items-center px-4 pb-4 z-50">
            <button onclick="router('home')" class="nav-btn group flex flex-col items-center gap-1" id="btn-home">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl group-hover:bg-white/5 transition">
                    <i class="fa-solid fa-house text-xl"></i>
                </div>
                <span class="text-[9px] font-bold">الرئيسية</span>
            </button>
            <button onclick="router('earn')" class="nav-btn group flex flex-col items-center gap-1" id="btn-earn">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl group-hover:bg-white/5 transition">
                    <i class="fa-solid fa-bolt-lightning text-xl text-yellow-400"></i>
                </div>
                <span class="text-[9px] font-bold">كسب</span>
            </button>
            <div class="relative">
                <button onclick="router('create')" class="w-12 h-9 bg-gradient-to-r from-tiktok-cyan to-tiktok-pink rounded-lg flex items-center justify-center shadow-lg -mt-4 active:scale-95 transition">
                    <i class="fa-solid fa-plus text-black font-black"></i>
                </button>
            </div>
            <button onclick="router('shop')" class="nav-btn group flex flex-col items-center gap-1" id="btn-shop">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl group-hover:bg-white/5 transition">
                    <i class="fa-solid fa-fire text-xl text-orange-500"></i>
                </div>
                <span class="text-[9px] font-bold">المتجر</span>
            </button>
            <button onclick="router('profile')" class="nav-btn group flex flex-col items-center gap-1" id="btn-profile">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl group-hover:bg-white/5 transition">
                    <i class="fa-solid fa-user-astronaut text-xl"></i>
                </div>
                <span class="text-[9px] font-bold">حسابي</span>
            </button>
        </nav>

        <!-- Toast System -->
        <div id="toast" class="absolute top-12 left-1/2 -translate-x-1/2 glass px-4 py-2.5 rounded-2xl flex items-center gap-3 scale-0 transition-transform duration-300 z-[100] border-white/20">
            <div id="toast-icon-bg" class="w-6 h-6 rounded-full flex items-center justify-center bg-accent-cyan/20">
                <i id="toast-icon" class="fa-solid fa-check text-[10px] text-accent-cyan"></i>
            </div>
            <span id="toast-msg" class="text-xs font-bold text-white/90"></span>
        </div>

        <!-- Account Link Modal -->
        <div id="modal" class="absolute inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-8">
            <div class="w-full space-y-8 animate-slide">
                <div class="text-center">
                    <h2 class="text-3xl font-black mb-2">ربط تيك توك 🤖</h2>
                    <p class="text-white/40 text-sm">أدخل بيانات حسابك لبدء الأتمتة</p>
                </div>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold pr-2">Username</label>
                        <input type="text" id="link-user" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-accent-cyan outline-none transition font-mono text-sm" placeholder="@username">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-white/30 font-bold pr-2">SessionID Cookie</label>
                        <input type="text" id="link-sid" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-accent-cyan outline-none transition font-mono text-[10px]" placeholder="Paste sessionid here...">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl bg-white/5 font-bold text-sm">إلغاء</button>
                    <button onclick="confirmLink()" class="flex-[2] py-4 rounded-2xl bg-white text-black font-black text-sm shadow-[0_0_20px_rgba(255,255,255,0.3)]">ربط الحساب الآن</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Update clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // Check Backend Status
        async function checkBackend() {
            const statusDot = document.querySelector('#backend-status span');
            const statusText = document.querySelector('#backend-status span:last-child');
            try {
                const res = await fetch('http://localhost:8000/health');
                if (res.ok) {
                    statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]';
                    statusText.innerText = 'CONNECTED';
                }
            } catch {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-red-500';
                statusText.innerText = 'OFFLINE';
            }
        }
        checkBackend();
        setInterval(checkBackend, 10000);
    </script>
</body>
</html>
